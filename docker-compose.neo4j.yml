services:
  neo4j:
    image: neo4j:5.26-community
    container_name: kg-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j123}
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-neo4j123} 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  importer:
    build:
      context: .
      dockerfile: Dockerfile.neo4j-import
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j123}
    command:
      - --uri
      - bolt://neo4j:7687
      - --user
      - neo4j
      - --password
      - ${NEO4J_PASSWORD:-neo4j123}
      - --wipe
      - --nodes
      - /app/kg_tables_all/kg_graph/nodes.csv
      - --edges
      - /app/kg_tables_all/kg_graph/edges.csv
    volumes:
      - ./:/app:ro

volumes:
  neo4j_data:
  neo4j_logs:
